name: E2E

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'e2e/**'
      - '.github/workflows/e2e.yml'
  schedule:
    - cron: '0 20 * * *'  # 3:00 AM ICT (UTC+7)
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uknow_campaign_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            e2e/package-lock.json

      - name: Cache frontend Yarn deps
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: yarn-${{ hashFiles('frontend/yarn.lock') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Install frontend deps
        run: yarn install --frozen-lockfile
        working-directory: frontend

      - name: Install e2e deps
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Create e2e/.env.test
        run: cp .env.test.example .env.test
        working-directory: e2e

      - name: Prepare test database
        run: |
          PGPASSWORD=postgres psql -h localhost -p 5433 -U postgres -d uknow_campaign_test \
            -v ON_ERROR_STOP=1 -f tests/integration/sql/bootstrap.sql
        working-directory: backend

      - name: Start backend
        run: node src/index.js > /tmp/uknow-backend.log 2>&1 &
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5433
          DB_NAME: uknow_campaign_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          PORT: 5001
          NODE_ENV: test
          SKIP_MIGRATIONS: 'true'
          JWT_SECRET: e2e-jwt-secret-not-for-production
          JWT_REFRESH_SECRET: e2e-jwt-refresh-secret-not-for-production
          JWT_EXPIRES_IN: 3h
          JWT_REFRESH_EXPIRES_IN: 7d
          BULLMQ_ENABLED: 'false'
          FRONTEND_URL: http://localhost:5174
          BACKEND_PUBLIC_URL: http://localhost:5001

      - name: Wait for backend
        run: curl --retry 15 --retry-delay 3 --retry-connrefused -sf http://localhost:5001/api/health

      - name: Backend logs on failure
        if: failure()
        run: cat /tmp/uknow-backend.log || true

      - name: Run Playwright tests
        run: npm test
        working-directory: e2e
        env:
          CI: 'true'

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload traces & screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: e2e/test-results/
          retention-days: 7
