name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    uses: ./.github/workflows/test-frontend.yml

  deploy:
    name: Build & Deploy Frontend
    needs: [lint, test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/uknow-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/uknow-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=/api
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_PRIMARY_APP_HOSTS=localhost,127.0.0.1,founderai.biz,www.founderai.biz
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DOCKERHUB_USERNAME
          script: |
            docker pull $DOCKERHUB_USERNAME/uknow-frontend:latest
            docker stop uknow-campaign-frontend || true
            docker rm uknow-campaign-frontend || true
            docker run -d \
              --name uknow-campaign-frontend \
              --network uknow_network \
              --restart unless-stopped \
              -p 80:80 \
              -p 443:443 \
              -v /root/uknow/frontend/default.conf:/etc/nginx/conf.d/default.conf \
              -v /etc/letsencrypt:/etc/letsencrypt:ro \
              $DOCKERHUB_USERNAME/uknow-frontend:latest
            docker image prune -f
            echo "Chờ nginx khởi động..."
            sleep 5
            if curl --retry 5 --retry-delay 2 --retry-connrefused -sf http://localhost > /dev/null; then
              echo "Smoke test passed — frontend healthy"
            else
              echo "Smoke test FAILED"
              docker logs --tail 50 uknow-campaign-frontend
              exit 1
            fi
