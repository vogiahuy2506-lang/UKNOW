name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    uses: ./.github/workflows/test-frontend.yml

  deploy:
    name: Build & Deploy Frontend
    needs: [lint, test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/uknow-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/uknow-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=/api
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_PRIMARY_APP_HOSTS=localhost,127.0.0.1,founderai.biz,www.founderai.biz
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/uknow-frontend:${{ github.sha }}
          EXPECTED_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,FRONTEND_IMAGE,EXPECTED_SHA
          script: |
            set -e
            echo "Deploying frontend image: $FRONTEND_IMAGE"
            docker pull "$FRONTEND_IMAGE"
            docker image inspect "$FRONTEND_IMAGE" --format 'Pulled image id: {{.Id}}'
            CPID=$(docker inspect --format '{{.State.Pid}}' uknow-campaign-frontend 2>/dev/null || echo "")
            [ -n "$CPID" ] && [ "$CPID" != "0" ] && kill -9 "$CPID" && sleep 2 || true
            docker rm uknow-campaign-frontend || true
            docker run -d \
              --name uknow-campaign-frontend \
              --network uknow_network \
              --label org.opencontainers.image.revision="$EXPECTED_SHA" \
              --restart unless-stopped \
              -p 80:80 \
              -p 443:443 \
              -v /etc/letsencrypt:/etc/letsencrypt:ro \
              "$FRONTEND_IMAGE"
            docker image prune -f
            echo "Chờ nginx khởi động..."
            sleep 5
            if curl --noproxy '*' --retry 5 --retry-delay 2 --retry-connrefused -kfsS \
              --resolve founderai.biz:443:127.0.0.1 \
              https://founderai.biz/ > /dev/null; then
              echo "Smoke test passed — frontend healthy"
            else
              echo "Smoke test FAILED"
              docker logs --tail 50 uknow-campaign-frontend
              exit 1
            fi
            LOCAL_VERSION_JSON=$(curl --noproxy '*' --retry 5 --retry-delay 2 --retry-connrefused -kfsS \
              --resolve founderai.biz:443:127.0.0.1 \
              "https://founderai.biz/version.json?deploy=$EXPECTED_SHA")
            echo "Local served version: $LOCAL_VERSION_JSON"
            case "$LOCAL_VERSION_JSON" in
              *"$EXPECTED_SHA"*) echo "Local version check passed — VPS is serving $EXPECTED_SHA" ;;
              *)
                echo "Local version check FAILED — expected $EXPECTED_SHA"
                docker inspect uknow-campaign-frontend --format 'Container image: {{.Config.Image}} revision={{ index .Config.Labels "org.opencontainers.image.revision" }}'
                docker logs --tail 50 uknow-campaign-frontend
                exit 1
                ;;
            esac
            PUBLIC_VERSION_JSON=$(curl --retry 5 --retry-delay 2 --retry-connrefused -kfsS \
              "https://founderai.biz/version.json?deploy=$EXPECTED_SHA")
            echo "Public served version: $PUBLIC_VERSION_JSON"
            case "$PUBLIC_VERSION_JSON" in
              *"$EXPECTED_SHA"*) echo "Public version check passed — founderai.biz is serving $EXPECTED_SHA" ;;
              *)
                echo "Public version check FAILED — expected $EXPECTED_SHA"
                echo "If the local check passed but public failed, clear Cloudflare/cache for founderai.biz."
                exit 1
                ;;
            esac
