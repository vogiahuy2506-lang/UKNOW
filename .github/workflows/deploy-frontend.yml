name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  lint:
    name: ESLint (frontend)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  deploy:
    name: Build & Deploy Frontend
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: hoangphucsenna/uknow-frontend:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull hoangphucsenna/uknow-frontend:latest
            docker stop uknow-campaign-frontend || true
            docker rm uknow-campaign-frontend || true
            docker run -d \
              --name uknow-campaign-frontend \
              --network uknow_network \
              --restart unless-stopped \
              -p 80:80 \
              -p 443:443 \
              -v /root/uknow/frontend/default.conf:/etc/nginx/conf.d/default.conf \
              -v /etc/letsencrypt:/etc/letsencrypt:ro \
              hoangphucsenna/uknow-frontend:latest
            docker image prune -f
