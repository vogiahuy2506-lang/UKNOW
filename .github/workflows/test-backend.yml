name: Test Backend

on:
  workflow_call:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/test-backend.yml'

concurrency:
  group: test-backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema-sync-check:
    name: Schema sync (migrations ↔ bootstrap.sql)
    runs-on: ubuntu-latest
    # Chỉ chạy cho PR vì cần so sánh với base branch.
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cảnh báo nếu migration mới chưa được mirror vào bootstrap.sql
        run: |
          BASE_REF="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1 || true

          MIGRATIONS_CHANGED=$(git diff --name-only "$BASE_REF"...HEAD | grep -c '^backend/migrations/' || true)
          BOOTSTRAP_CHANGED=$(git diff --name-only "$BASE_REF"...HEAD | grep -c '^backend/tests/integration/sql/bootstrap.sql' || true)

          if [ "$MIGRATIONS_CHANGED" -gt 0 ] && [ "$BOOTSTRAP_CHANGED" -eq 0 ]; then
            echo "::warning::PR có $MIGRATIONS_CHANGED file migration thay đổi nhưng KHÔNG sửa backend/tests/integration/sql/bootstrap.sql."
            echo "::warning::Nếu migration thêm/đổi cột NOT NULL hoặc bảng mới được dùng trong code, hãy mirror vào bootstrap.sql để integration test vẫn pass."
            echo ""
            echo "Migrations đổi trong PR:"
            git diff --name-only "$BASE_REF"...HEAD | grep '^backend/migrations/' || true
          else
            echo "✅ Không phát hiện drift giữa migrations và bootstrap.sql trong PR này."
          fi

  unit:
    name: Jest unit (backend)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest (unit)
        run: npm run test:unit -- --ci

  integration:
    name: Jest integration (backend)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uknow_campaign_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: uknow_campaign_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ci-jwt-secret
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      BULLMQ_ENABLED: 'false'
      NODE_ENV: test

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        id: checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest (integration + coverage)
        run: npm run test:coverage -- --ci

      - name: Coverage summary trên PR
        if: always() && steps.checkout.outcome == 'success'
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "### 📊 Coverage backend" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              const fmt = (m) => \`\${m.pct.toString().padStart(6)}%  (\${m.covered}/\${m.total})\`;
              console.log('Statements:', fmt(c.statements));
              console.log('Branches  :', fmt(c.branches));
              console.log('Functions :', fmt(c.functions));
              console.log('Lines     :', fmt(c.lines));
            " >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "(coverage-summary.json không tồn tại — kiểm tra config Jest)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifact
        if: always() && steps.checkout.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7
          if-no-files-found: warn
