name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test-backend.yml

  deploy:
    name: Build & Deploy Backend
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/uknow-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/uknow-backend:${{ github.sha }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DOCKERHUB_USERNAME
          script: |
            docker pull $DOCKERHUB_USERNAME/uknow-backend:latest
            CPID=$(docker inspect --format '{{.State.Pid}}' uknow-campaign-backend 2>/dev/null || echo "")
            [ -n "$CPID" ] && [ "$CPID" != "0" ] && kill -9 "$CPID" && sleep 2 || true
            docker rm uknow-campaign-backend || true
            docker run -d \
              --name uknow-campaign-backend \
              --network uknow_network \
              --restart unless-stopped \
              -p 5001:5001 \
              -v /root/uknow/backend/.env:/app/.env \
              -v /root/uknow/backend/uploads:/app/uploads \
              -v /root/uknow/backend/temp_uploads:/app/temp_uploads \
              $DOCKERHUB_USERNAME/uknow-backend:latest
            docker image prune -f
            echo "Chờ server khởi động..."
            sleep 8
            if curl --retry 5 --retry-delay 3 --retry-connrefused -sf http://localhost:5001/api/health > /dev/null; then
              echo "Smoke test passed — backend healthy"
            else
              echo "Smoke test FAILED"
              docker logs --tail 50 uknow-campaign-backend
              exit 1
            fi
