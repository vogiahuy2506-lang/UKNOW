name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test-backend.yml

  deploy:
    name: Build & Deploy Backend
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          provenance: false
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/uknow-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/uknow-backend:${{ github.sha }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
            LP_APEX_FIXED_IP=${{ secrets.LP_APEX_FIXED_IP }}
            LP_CNAME_TARGET=${{ secrets.LP_CNAME_TARGET }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push image (with retry)
        run: |
          for attempt in 1 2 3; do
            echo "--- Push attempt $attempt/3 ---"
            docker push "${{ secrets.DOCKERHUB_USERNAME }}/uknow-backend:latest" && \
            docker push "${{ secrets.DOCKERHUB_USERNAME }}/uknow-backend:${{ github.sha }}" && exit 0
            echo "Push failed, retrying in 20s..."
            sleep 20
          done
          echo "All push attempts failed"
          exit 1

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/uknow-backend:${{ github.sha }}
          EXPECTED_SHA: ${{ github.sha }}
          SSL_SCRIPT: |
            #!/bin/bash
            # ssl-auto-provision.sh
            # Script tự động cấp SSL certificate cho custom domains
            # Chạy sau khi domain được verify thành công

            set -e

            LOG_FILE="/var/log/ssl-provision.log"
            CERTBOT="/usr/bin/certbot"
            NGINX="/usr/sbin/nginx"
            CERT_DIR="/etc/letsencrypt/live"
            WEBROOT="/var/www/certbot"

            log() {
                echo "[$(date '+%Y-%m-%d %H:%M:%S')] $1" | tee -a "$LOG_FILE"
            }

            error() {
                echo "[$(date '+%Y-%m-%d %H:%M:%S')] ERROR: $1" | tee -a "$LOG_FILE" >&2
                exit 1
            }

            # Check root
            if [[ $EUID -ne 0 ]]; then
               error "Script này cần chạy với quyền root"
            fi

            # Get domain from argument
            DOMAIN="$1"

            if [[ -z "$DOMAIN" ]]; then
                echo "Usage: $0 <domain>"
                echo "Example: $0 digibook.com.vn"
                exit 1
            fi

            log "Starting SSL provision for: $DOMAIN"

            # Create webroot if not exists
            mkdir -p "$WEBROOT/.well-known/acme-challenge"
            chown -R www-data:www-data "$WEBROOT" 2>/dev/null || true

            # Check if certificate already exists
            if [[ -d "$CERT_DIR/$DOMAIN" ]]; then
                log "Certificate already exists for $DOMAIN, checking if valid..."
                if openssl x509 -checkend 0 -in "$CERT_DIR/$DOMAIN/fullchain.pem" > /dev/null 2>&1; then
                    log "Certificate is still valid. No need to renew."
                else
                    log "Certificate expired or expiring soon, renewing..."
                    $CERTBOT renew --cert-name "$DOMAIN" --webroot -w "$WEBROOT" --non-interactive || log "Renewal failed or not due yet"
                fi
            else
                # Get new certificate
                log "Requesting SSL certificate from Let's Encrypt..."

                if $CERTBOT certonly \
                    --webroot \
                    -w "$WEBROOT" \
                    -d "$DOMAIN" \
                    --non-interactive \
                    --agree-tos \
                    --email support@digiso.vn \
                    --keep-until-expiring \
                    2>&1 | tee -a "$LOG_FILE"; then
                    log "Certificate obtained successfully!"
                else
                    error "Failed to obtain certificate for $DOMAIN"
                fi
            fi

            # Create nginx config for this domain
            log "Creating Nginx configuration for $DOMAIN..."
            SSL_CONFIG="/etc/nginx/conf.d/ssl-$DOMAIN.conf"

            cat > "$SSL_CONFIG" << EOF
            # SSL config for $DOMAIN - Auto-generated by ssl-auto-provision.sh
            # DO NOT EDIT MANUALLY - Will be overwritten on renewal

            server {
                listen 80;
                server_name $DOMAIN;

                location /.well-known/acme-challenge/ {
                    root $WEBROOT;
                    try_files \$uri =404;
                }

                location / {
                    return 301 https://\$host\$request_uri;
                }
            }

            server {
                listen 443 ssl http2;
                server_name $DOMAIN;

                ssl_certificate $CERT_DIR/$DOMAIN/fullchain.pem;
                ssl_certificate_key $CERT_DIR/$DOMAIN/privkey.pem;

                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_prefer_server_ciphers off;
                ssl_session_cache shared:SSL:10m;
                ssl_session_timeout 1d;

                client_max_body_size 50m;

                # ACME challenge
                location /.well-known/acme-challenge/ {
                    root $WEBROOT;
                    try_files \$uri =404;
                }

                location / {
                    resolver 127.0.0.11 valid=10s ipv6=off;
                    set \$backend_upstream http://uknow-campaign-backend:5001;
                    proxy_pass \$backend_upstream;
                    proxy_http_version 1.1;

                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
            EOF

            log "Nginx config created at $SSL_CONFIG"

            # Test and reload nginx
            log "Testing Nginx configuration..."
            if $NGINX -t 2>&1 | tee -a "$LOG_FILE"; then
                log "Reloading Nginx..."
                $NGINX -s reload
                log "Nginx reloaded successfully"
            else
                error "Nginx config test failed"
            fi

            log "SSL provision completed for: $DOMAIN"

            # Verify SSL
            log "Verifying SSL certificate..."
            if [[ -f "$CERT_DIR/$DOMAIN/fullchain.pem" ]]; then
                echo | openssl s_client -connect "$DOMAIN:443" -servername "$DOMAIN" 2>/dev/null | openssl x509 -noout -dates || log "Warning: Could not verify SSL in browser"
                log "Certificate details:"
                openssl x509 -in "$CERT_DIR/$DOMAIN/fullchain.pem" -noout -subject -issuer -dates 2>&1 | tee -a "$LOG_FILE"
            else
                log "Warning: Certificate file not found"
            fi

            exit 0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,BACKEND_IMAGE,EXPECTED_SHA
          script: |
            set -e
            echo "Deploying backend image: $BACKEND_IMAGE"
            docker pull "$BACKEND_IMAGE"
            docker image inspect "$BACKEND_IMAGE" --format 'Pulled image id: {{.Id}}'
            mkdir -p /root/uknow/scripts
            cat > /root/uknow/scripts/ssl-auto-provision.sh << 'EOF_SSL_SCRIPT'
            #!/bin/bash
            # ssl-auto-provision.sh
            # Script tự động cấp SSL certificate cho custom domains
            # Chạy sau khi domain được verify thành công

            set -e

            LOG_FILE="/var/log/ssl-provision.log"
            CERTBOT="/usr/bin/certbot"
            NGINX="/usr/sbin/nginx"
            CERT_DIR="/etc/letsencrypt/live"
            WEBROOT="/var/www/certbot"

            log() {
                echo "[$(date '+%Y-%m-%d %H:%M:%S')] $1" | tee -a "$LOG_FILE"
            }

            error() {
                echo "[$(date '+%Y-%m-%d %H:%M:%S')] ERROR: $1" | tee -a "$LOG_FILE" >&2
                exit 1
            }

            # Check root
            if [[ $EUID -ne 0 ]]; then
               error "Script này cần chạy với quyền root"
            fi

            # Get domain from argument
            DOMAIN="$1"

            if [[ -z "$DOMAIN" ]]; then
                echo "Usage: $0 <domain>"
                echo "Example: $0 digibook.com.vn"
                exit 1
            fi

            log "Starting SSL provision for: $DOMAIN"

            # Create webroot if not exists
            mkdir -p "$WEBROOT/.well-known/acme-challenge"
            chown -R www-data:www-data "$WEBROOT" 2>/dev/null || true

            # Check if certificate already exists
            if [[ -d "$CERT_DIR/$DOMAIN" ]]; then
                log "Certificate already exists for $DOMAIN, checking if valid..."
                if openssl x509 -checkend 0 -in "$CERT_DIR/$DOMAIN/fullchain.pem" > /dev/null 2>&1; then
                    log "Certificate is still valid. No need to renew."
                else
                    log "Certificate expired or expiring soon, renewing..."
                    $CERTBOT renew --cert-name "$DOMAIN" --webroot -w "$WEBROOT" --non-interactive || log "Renewal failed or not due yet"
                fi
            else
                # Get new certificate
                log "Requesting SSL certificate from Let's Encrypt..."

                if $CERTBOT certonly \
                    --webroot \
                    -w "$WEBROOT" \
                    -d "$DOMAIN" \
                    --non-interactive \
                    --agree-tos \
                    --email support@digiso.vn \
                    --keep-until-expiring \
                    2>&1 | tee -a "$LOG_FILE"; then
                    log "Certificate obtained successfully!"
                else
                    error "Failed to obtain certificate for $DOMAIN"
                fi
            fi

            # Create nginx config for this domain
            log "Creating Nginx configuration for $DOMAIN..."
            SSL_CONFIG="/etc/nginx/conf.d/ssl-$DOMAIN.conf"

            cat > "$SSL_CONFIG" << EOF
            # SSL config for $DOMAIN - Auto-generated by ssl-auto-provision.sh
            # DO NOT EDIT MANUALLY - Will be overwritten on renewal

            server {
                listen 80;
                server_name $DOMAIN;

                location /.well-known/acme-challenge/ {
                    root $WEBROOT;
                    try_files \$uri =404;
                }

                location / {
                    return 301 https://\$host\$request_uri;
                }
            }

            server {
                listen 443 ssl http2;
                server_name $DOMAIN;

                ssl_certificate $CERT_DIR/$DOMAIN/fullchain.pem;
                ssl_certificate_key $CERT_DIR/$DOMAIN/privkey.pem;

                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_prefer_server_ciphers off;
                ssl_session_cache shared:SSL:10m;
                ssl_session_timeout 1d;

                client_max_body_size 50m;

                # ACME challenge
                location /.well-known/acme-challenge/ {
                    root $WEBROOT;
                    try_files \$uri =404;
                }

                location / {
                    resolver 127.0.0.11 valid=10s ipv6=off;
                    set \$backend_upstream http://uknow-campaign-backend:5001;
                    proxy_pass \$backend_upstream;
                    proxy_http_version 1.1;

                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
            EOF

            log "Nginx config created at $SSL_CONFIG"

            # Test and reload nginx
            log "Testing Nginx configuration..."
            if $NGINX -t 2>&1 | tee -a "$LOG_FILE"; then
                log "Reloading Nginx..."
                $NGINX -s reload
                log "Nginx reloaded successfully"
            else
                error "Nginx config test failed"
            fi

            log "SSL provision completed for: $DOMAIN"

            # Verify SSL
            log "Verifying SSL certificate..."
            if [[ -f "$CERT_DIR/$DOMAIN/fullchain.pem" ]]; then
                echo | openssl s_client -connect "$DOMAIN:443" -servername "$DOMAIN" 2>/dev/null | openssl x509 -noout -dates || log "Warning: Could not verify SSL in browser"
                log "Certificate details:"
                openssl x509 -in "$CERT_DIR/$DOMAIN/fullchain.pem" -noout -subject -issuer -dates 2>&1 | tee -a "$LOG_FILE"
            else
                log "Warning: Certificate file not found"
            fi

            exit 0
            EOF_SSL_SCRIPT
            chmod +x /root/uknow/scripts/ssl-auto-provision.sh
            echo "SSL provision script deployed to /root/uknow/scripts/ssl-auto-provision.sh"
            if docker inspect uknow-campaign-backend > /dev/null 2>&1; then
              echo "Removing old backend container..."
              docker update --restart=no uknow-campaign-backend || true
              docker rm -f uknow-campaign-backend || true
              sleep 2
              # Fallback: nếu daemon conflict khiến rm -f thất bại, kill PID trực tiếp rồi rm lại
              if docker inspect uknow-campaign-backend > /dev/null 2>&1; then
                CPID=$(docker inspect uknow-campaign-backend --format '{{.State.Pid}}' 2>/dev/null || echo "")
                if [ -n "$CPID" ] && [ "$CPID" != "0" ]; then
                  echo "Fallback: kill -9 pid=$CPID"
                  kill -9 "$CPID" 2>/dev/null || true
                  sleep 2
                fi
                docker rm -f uknow-campaign-backend || true
              fi
              if docker inspect uknow-campaign-backend > /dev/null 2>&1; then
                docker inspect uknow-campaign-backend --format 'Could not remove old container: pid={{.State.Pid}} status={{.State.Status}} running={{.State.Running}} restart={{.HostConfig.RestartPolicy.Name}}'
                exit 1
              fi
            fi
            DOCKER_GID="$(stat -c '%g' /var/run/docker.sock 2>/dev/null || echo 0)"
            docker run -d \
              --name uknow-campaign-backend \
              --network uknow_network \
              --group-add "$DOCKER_GID" \
              --label org.opencontainers.image.revision="$EXPECTED_SHA" \
              --restart unless-stopped \
              -p 5001:5001 \
              -v /root/uknow/backend/.env:/app/.env \
              -v /var/run/docker.sock:/var/run/docker.sock:ro \
              -v /root/uknow/backend/uploads:/app/uploads \
              -v /root/uknow/backend/temp_uploads:/app/temp_uploads \
              "$BACKEND_IMAGE"
            docker image prune -f
            echo "Chờ server khởi động..."
            sleep 8
            if curl --retry 5 --retry-delay 3 --retry-connrefused -sf http://localhost:5001/api/health > /dev/null; then
              echo "Smoke test passed — backend healthy"
            else
              echo "Smoke test FAILED"
              docker logs --tail 50 uknow-campaign-backend
              exit 1
            fi
