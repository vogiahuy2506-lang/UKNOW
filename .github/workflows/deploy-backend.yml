name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test-backend.yml

  deploy:
    name: Build & Deploy Backend
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          provenance: false
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/uknow-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/uknow-backend:${{ github.sha }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push image (with retry)
        run: |
          for attempt in 1 2 3; do
            echo "--- Push attempt $attempt/3 ---"
            docker push "${{ secrets.DOCKERHUB_USERNAME }}/uknow-backend:latest" && \
            docker push "${{ secrets.DOCKERHUB_USERNAME }}/uknow-backend:${{ github.sha }}" && exit 0
            echo "Push failed, retrying in 20s..."
            sleep 20
          done
          echo "All push attempts failed"
          exit 1

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/uknow-backend:${{ github.sha }}
          EXPECTED_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,BACKEND_IMAGE,EXPECTED_SHA
          script: |
            set -e
            echo "Deploying backend image: $BACKEND_IMAGE"
            docker pull "$BACKEND_IMAGE"
            docker image inspect "$BACKEND_IMAGE" --format 'Pulled image id: {{.Id}}'
            if docker inspect uknow-campaign-backend > /dev/null 2>&1; then
              echo "Removing old backend container..."
              docker update --restart=no uknow-campaign-backend || true
              for i in $(seq 1 15); do
                RUNNING=$(docker inspect --format '{{.State.Running}}' uknow-campaign-backend 2>/dev/null || echo "false")
                [ "$RUNNING" = "false" ] && break
                CPID=$(docker inspect --format '{{.State.Pid}}' uknow-campaign-backend 2>/dev/null || echo "")
                if [ -n "$CPID" ] && [ "$CPID" != "0" ]; then
                  kill -9 "$CPID" 2>/dev/null || sudo -n kill -9 "$CPID" 2>/dev/null || true
                fi
                sleep 1
              done
              RUNNING=$(docker inspect --format '{{.State.Running}}' uknow-campaign-backend 2>/dev/null || echo "false")
              if [ "$RUNNING" != "false" ]; then
                docker inspect uknow-campaign-backend --format 'Could not stop old container: pid={{.State.Pid}} status={{.State.Status}} running={{.State.Running}}'
                exit 1
              fi
              docker rm uknow-campaign-backend
            fi
            DOCKER_GID="$(stat -c '%g' /var/run/docker.sock 2>/dev/null || echo 0)"
            docker run -d \
              --name uknow-campaign-backend \
              --network uknow_network \
              --group-add "$DOCKER_GID" \
              --label org.opencontainers.image.revision="$EXPECTED_SHA" \
              --restart unless-stopped \
              -p 5001:5001 \
              -v /root/uknow/backend/.env:/app/.env \
              -v /var/run/docker.sock:/var/run/docker.sock:ro \
              -v /root/uknow/backend/uploads:/app/uploads \
              -v /root/uknow/backend/temp_uploads:/app/temp_uploads \
              "$BACKEND_IMAGE"
            docker image prune -f
            echo "Chờ server khởi động..."
            sleep 8
            if curl --retry 5 --retry-delay 3 --retry-connrefused -sf http://localhost:5001/api/health > /dev/null; then
              echo "Smoke test passed — backend healthy"
            else
              echo "Smoke test FAILED"
              docker logs --tail 50 uknow-campaign-backend
              exit 1
            fi
