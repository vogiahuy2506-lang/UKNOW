name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  test:
    name: Jest (backend)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm test -- --ci

  deploy:
    name: Build & Deploy Backend
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: hoangphucsenna/uknow-backend:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull hoangphucsenna/uknow-backend:latest
            docker stop uknow-campaign-backend || true
            docker rm uknow-campaign-backend || true
            docker run -d \
              --name uknow-campaign-backend \
              --network uknow_network \
              --restart unless-stopped \
              -p 5001:5001 \
              -v /root/uknow/backend/.env:/app/.env \
              -v /root/uknow/backend/uploads:/app/uploads \
              -v /root/uknow/backend/temp_uploads:/app/temp_uploads \
              hoangphucsenna/uknow-backend:latest
            docker image prune -f
