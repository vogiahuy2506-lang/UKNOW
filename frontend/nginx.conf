# ACME challenge cho Let's Encrypt (shared across all servers)
# SSL certificates và configs được tạo tự động bởi ssl-auto-provision.sh
# Per-domain SSL configs are generated on the host and mounted read-only.
include /etc/nginx/domains/*.conf;

# Fallback catch-all cho *.founderai.biz subdomains
server {
  listen 80;
  server_name ~.+\.founderai\.biz$;

  location / {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream http://uknow-campaign-backend:5001;
    proxy_pass $backend_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# Catch-all server cho tất cả custom domains
# 
# SSL handling:
# - Tất cả domains (subdomain và apex) đều dùng Let's Encrypt qua Certbot
# - ssl-auto-provision.sh sẽ gọi certbot để cấp SSL và tạo server block riêng
# 
# Flow:
# 1. User thêm domain → Backend verify DNS → Active
# 2. Backend gọi ssl-auto-provision.sh → certbot cấp SSL
# 3. Certbot tạo server block mới với SSL cert → Nginx reload

server {
  listen 80;
  server_name _;
  
  # ACME challenge cho Let's Encrypt
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    try_files $uri =404;
  }

  location / {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream http://uknow-campaign-backend:5001;
    proxy_pass $backend_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name founderai.biz www.founderai.biz;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name founderai.biz www.founderai.biz;

  ssl_certificate /etc/letsencrypt/live/founderai.biz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/founderai.biz/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;

  client_max_body_size 50m;

  root /usr/share/nginx/html;
  index index.html;

  location = /version.json {
      add_header Cache-Control "no-store";
      try_files $uri =404;
  }

  location = /index.html {
      add_header Cache-Control "no-store";
      try_files $uri =404;
  }

  location /assets/ {
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files $uri =404;
  }

  location /t/ {
      resolver 127.0.0.11 valid=10s ipv6=off;
      set $backend_upstream http://uknow-campaign-backend:5001;
      proxy_pass $backend_upstream;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
      add_header Cache-Control "no-store";
      try_files $uri /index.html;
  }

  location /api/ {
      resolver 127.0.0.11 valid=10s ipv6=off;
      set $backend_upstream http://uknow-campaign-backend:5001;
      proxy_pass $backend_upstream;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
  }
}
