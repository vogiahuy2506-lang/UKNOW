server {
  listen 80;
  server_name campaign.digiso.vn www.campaign.digiso.vn;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name campaign.digiso.vn www.campaign.digiso.vn;

  ssl_certificate /etc/letsencrypt/live/campaign.digiso.vn/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/campaign.digiso.vn/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;

  root /usr/share/nginx/html;
  index index.html;

  # Link rút gọn tracking: backend mount GET /t/:code — phải proxy trước SPA,
  # nếu không mọi /t/... sẽ rơi vào try_files → index.html (mất redirect).
  location /t/ {
      proxy_pass http://uknow-campaign-backend:5001;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA: chỉ thử file tĩnh rồi fallback index.html.
  # Không dùng $uri/ — nếu có thư mục trùng tên route (vd. privacy-policy/) hoặc URI có / cuối,
  # nginx có thể coi là thư mục không có index → 403 Forbidden thay vì vào React Router.
  location / {
      try_files $uri /index.html;
  }

  location /api/ {
      proxy_pass http://uknow-campaign-backend:5001;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
  }
}