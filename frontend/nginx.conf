# Wildcard subdomains cho landing pages (*.founderai.biz)
# SSL được Cloudflare xử lý (orange cloud proxied), origin chỉ cần HTTP
server {
  listen 80;
  server_name ~.+\.founderai\.biz$;

  location / {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream http://uknow-campaign-backend:5001;
    proxy_pass $backend_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name founderai.biz www.founderai.biz;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name founderai.biz www.founderai.biz;

  ssl_certificate /etc/letsencrypt/live/founderai.biz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/founderai.biz/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;

  client_max_body_size 50m;

  root /usr/share/nginx/html;
  index index.html;

  location = /version.json {
      add_header Cache-Control "no-store";
      try_files $uri =404;
  }

  location = /index.html {
      add_header Cache-Control "no-store";
      try_files $uri =404;
  }

  location /assets/ {
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files $uri =404;
  }

  location /t/ {
      resolver 127.0.0.11 valid=10s ipv6=off;
      set $backend_upstream http://uknow-campaign-backend:5001;
      proxy_pass $backend_upstream;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
      add_header Cache-Control "no-store";
      try_files $uri /index.html;
  }

  location /api/ {
      resolver 127.0.0.11 valid=10s ipv6=off;
      set $backend_upstream http://uknow-campaign-backend:5001;
      proxy_pass $backend_upstream;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
  }
}
