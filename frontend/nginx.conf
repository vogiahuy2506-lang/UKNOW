server {
  listen 80;
  server_name founderai.biz www.founderai.biz;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name founderai.biz www.founderai.biz;

  ssl_certificate /etc/letsencrypt/live/founderai.biz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/founderai.biz/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;

  root /usr/share/nginx/html;
  index index.html;

  location /t/ {
      proxy_pass http://uknow-campaign-backend:5001;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
      try_files $uri /index.html;
  }

  location /api/ {
      proxy_pass http://uknow-campaign-backend:5001;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
  }
}