server {
  listen 80;
  server_name campaign.digiso.vn www.campaign.digiso.vn;

  return 301 https://$host$request_uri;
}

server {
  listen 80;
  server_name security.digiso.vn www.security.digiso.vn;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name campaign.digiso.vn www.campaign.digiso.vn;

  ssl_certificate /etc/letsencrypt/live/campaign.digiso.vn/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/campaign.digiso.vn/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;

  root /usr/share/nginx/html;
  index index.html;

  # Link rút gọn tracking: backend mount GET /t/:code — phải proxy trước SPA,
  # nếu không mọi /t/... sẽ rơi vào try_files → index.html (mất redirect).
  location /t/ {
      proxy_pass http://uknow-campaign-backend:5001;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
      try_files $uri $uri/ /index.html;
  }

  location /api/ {
      proxy_pass http://uknow-campaign-backend:5001;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl;
  server_name security.digiso.vn www.security.digiso.vn;

  ssl_certificate /etc/letsencrypt/live/security.digiso.vn/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/security.digiso.vn/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;

  root /usr/share/nginx/html;
  index index.html;

  # Domain security mặc định mở thẳng trang chính sách bảo mật.
  location = / {
      return 302 /privacy-policy;
  }

  # Chỉ cho phép route privacy đi qua SPA.
  location = /privacy-policy {
      try_files $uri $uri/ /index.html;
  }

  # Cho phép tải static assets của Vite để trang privacy hoạt động.
  location /assets/ {
      try_files $uri =404;
  }

  # Chỉ mở một số file public phổ biến nếu có.
  location ~* ^/(favicon\.ico|robots\.txt|manifest\.webmanifest)$ {
      try_files $uri =404;
  }

  # Chặn toàn bộ đường dẫn còn lại trên domain security.
  location / {
      return 404;
  }
}