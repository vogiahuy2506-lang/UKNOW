server {
  listen 80;
  server_name campaign.uknow.edu.vn www.campaign.uknow.edu.vn;

  # Ép toàn bộ truy cập HTTP sang HTTPS khi chạy trên VPS.
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name campaign.uknow.edu.vn www.campaign.uknow.edu.vn;

  # Chứng chỉ được mount từ host VPS vào container qua docker-compose.
  ssl_certificate /etc/letsencrypt/live/campaign.uknow.edu.vn/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/campaign.uknow.edu.vn/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: mọi route frontend trả về index.html để React Router xử lý
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reverse proxy API backend để frontend gọi cùng domain
  location /api/ {
    proxy_pass http://uknow-campaign-backend:5001/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /track/ {
    proxy_pass http://uknow-campaign-backend:5001/track/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /file/ {
    proxy_pass http://uknow-campaign-backend:5001/file/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /download/ {
    proxy_pass http://uknow-campaign-backend:5001/download/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
