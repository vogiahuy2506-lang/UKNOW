services:
  frontend:
    container_name: uknow-campaign-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped
    networks:
      - uknow_network
    # Giới hạn log: mỗi file tối đa 5MB, giữ tối đa 3 file xoay vòng (~15MB tổng)
    # Frontend (nginx) ít log hơn backend nên giới hạn nhỏ hơn
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

networks:
  uknow_network:
    external: true
    name: uknow_network
