services:
  frontend:
    container_name: uknow-campaign-frontend
    image: ghcr.io/nhatminh7104/uknow-fe:latest
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    restart: unless-stopped
    networks:
      - uknow_network
    volumes:
      # Frontend vẫn cần file .env trong container theo yêu cầu vận hành.
      - ./.env:/usr/share/nginx/html/.env
      # Luôn mount nginx.conf để container dùng đúng config domain mới nhất.
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount chứng chỉ SSL từ VPS (Let's Encrypt).
      - /etc/letsencrypt:/etc/letsencrypt:ro
    # Giới hạn log: mỗi file tối đa 5MB, giữ tối đa 3 file xoay vòng (~15MB tổng)
    # Frontend (nginx) ít log hơn backend nên giới hạn nhỏ hơn
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

networks:
  uknow_network:
    external: true
    name: uknow_network
